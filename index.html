<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="https://img.icons8.com/?size=100&id=M9BRw0RJZXKi&format=png&color=000000">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Windows 11 Download Center</title>
    <style>
        :root {
            --bg-main: #0a0a0a;
            --card-bg: #141414;
            --text-main: #ffffff;
            --text-secondary: #999999;
            --border-color: #262626;
            --accent-purple: #8b5cf6;
            --accent-purple-hover: #a78bfa;
            --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: var(--font-family);
            background-color: var(--bg-main);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            width: 100%;
            max-width: 400px;
            padding: 32px;
            text-align: left; /* Classy off-center alignment style */
        }
        .icon-container { margin-bottom: 20px; }
        .win11-logo { width: 44px; height: 44px; }
        h1 { font-size: 21px; font-weight: 600; margin-bottom: 8px; letter-spacing: -0.2px; }
        p { font-size: 13.5px; color: var(--text-secondary); margin-bottom: 24px; line-height: 1.5; }
        .download-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background-color: var(--accent-purple);
            color: #ffffff;
            border: none;
            border-radius: 6px;
            padding: 0 20px;
            font-size: 13.5px;
            font-weight: 500;
            text-decoration: none;
            cursor: pointer;
            transition: background-color 0.15s ease;
            width: 100%;
            height: 40px;
        }
        .download-btn:hover { background-color: var(--accent-purple-hover); }
        .file-info {
            margin-top: 24px;
            font-size: 11px;
            color: var(--text-secondary);
            border-top: 1px solid var(--border-color);
            padding-top: 16px;
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon-container">
            <svg class="win11-logo" viewBox="0 0 24 24" fill="currentColor" xmlns="http://w3.org">
                <path d="M0 0h11.5v11.5H0zM12.5 0H24v11.5H12.5zM0 12.5h11.5V24H0zM12.5 12.5H24V24H12.5z" fill="#8b5cf6"/>
            </svg>
        </div>
        <h1>MAS All-In-One Script</h1>
        <p>Grab the official production command script release file directly hosted from the secure cloud pipeline repository.</p>
        <a href="https://dev.azure.com/massgrave/Microsoft-Activation-Scripts/_apis/git/repositories/Microsoft-Activation-Scripts/items?path=/MAS/All-In-One-Version-KL/MAS_AIO.cmd&download=true" class="download-btn">Download Package File</a>
        <div class="file-info">
            <span>Verified Server</span>
            <span>Azure DevOps</span>
        </div>
    </div>
</body>
</html>
